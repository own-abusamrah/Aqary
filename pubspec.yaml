name: aqary
description: A location-based mobile app for buying and selling land.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  cloud_functions: ^6.2.0

  # Maps & Location
  flutter_map: ^8.2.2
  google_maps_flutter: ^2.12.0
  latlong2: ^0.9.0
  flutter_map_cancellable_tile_provider: ^3.1.1
  geolocator: ^14.0.2

  # Image handling
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Whatsapp and dialer
  url_launcher: ^6.2.5

  # UI helpers
  cupertino_icons: ^1.0.2
  widget_to_marker: ^1.0.6

  # HTTP
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
 uses-material-design: true
 assets:
    - assets/images/logo.png